# =============================================================================
# EMU NFC Gate Reader — Hardware Configuration (I2C / PN532)
# =============================================================================
# Include BOTH files from printer.cfg:
#   [include nfc_macros.cfg]
#   [include nfc_gate_i2c_pn532.cfg]
#
# Hardware path: one PN532 per EMU gate, wired to the software I2C bus on each
# EBB42 lane board.  No separate MCU or CAN transceiver is needed — the lane
# MCUs are already on CAN via Happy Hare's mmu_hardware.cfg.
#
# Integration model — UID lookup 
# ────────────────────────────────────────────
# Tags are NEVER written to.  Stick any blank 13.56 MHz NFC tag on each spool.
# For each spool, read its tag UID with your phone and paste it into the "rfid"
# extra field on the matching Spoolman spool record.
# See docs/shared/spoolman-integration.md for step-by-step instructions.
#
# Required install steps (do these once):
#   1. Clone the repo and run install.sh — see Readme.md for the one-liner.
#   2. Wire each PN532 to its EBB42 lane board — see docs/i2c-pn532/wiring.md.
#   3. Set up the Spoolman "rfid" extra field — see docs/shared/spoolman-integration.md.
#   4. Fill in your Spoolman URL below.
#   5. Add both includes to printer.cfg (above).
#   6. Restart Klipper:  sudo systemctl restart klipper
#
# Driver:   pn532_driver.PN532Driver  (ISO14443A via InListPassiveTarget)
# I2C bus:  software I2C on EBB42 PB3 (SCL) / PB4 (SDA)  — shared with BME280
# Address:  0x24 (PN532 default)  /  0x76 is BME280 — no conflict
# Macros:   nfc_macros.cfg (shared with SPI path — include separately)
# =============================================================================


# =============================================================================
# [nfc_gate laneN] — one section per gate
# =============================================================================
# Each section manages one PN532 on one EBB42 lane board.
# The lane MCU names (lane0, lane1, …) are defined in mmu_hardware.cfg —
# do NOT redefine them here.
#
# Add or remove sections to match your physical gate count.
# =============================================================================

# ── Lane 0 ────────────────────────────────────────────────────────────────────
[nfc_gate lane0]
gate:                    0
i2c_mcu:                 lane0
i2c_software_scl_pin:    lane0:PB3
i2c_software_sda_pin:    lane0:PB4
i2c_address:             36          # 0x24 — PN532 default I2C address
spoolman_url:            http://mainsailos.local:7912   # ← set your Spoolman URL

# ── Lane 1 ────────────────────────────────────────────────────────────────────
[nfc_gate lane1]
gate:                    1
i2c_mcu:                 lane1
i2c_software_scl_pin:    lane1:PB3
i2c_software_sda_pin:    lane1:PB4
i2c_address:             36
spoolman_url:            http://mainsailos.local:7912

# ── Lane 2 ────────────────────────────────────────────────────────────────────
[nfc_gate lane2]
gate:                    2
i2c_mcu:                 lane2
i2c_software_scl_pin:    lane2:PB3
i2c_software_sda_pin:    lane2:PB4
i2c_address:             36
spoolman_url:            http://mainsailos.local:7912

# ── Lane 3 ────────────────────────────────────────────────────────────────────
[nfc_gate lane3]
gate:                    3
i2c_mcu:                 lane3
i2c_software_scl_pin:    lane3:PB3
i2c_software_sda_pin:    lane3:PB4
i2c_address:             36
spoolman_url:            http://mainsailos.local:7912

# ── Lane 4 (uncomment if fitted) ──────────────────────────────────────────────
# [nfc_gate lane4]
# gate:                  4
# i2c_mcu:               lane4
# i2c_software_scl_pin:  lane4:PB3
# i2c_software_sda_pin:  lane4:PB4
# i2c_address:           36
# spoolman_url:          http://mainsailos.local:7912


# =============================================================================
# Optional per-gate tuning
# =============================================================================
# Add any of these keys inside a [nfc_gate] section to override the default.
#
# spoolman_url:      http://192.168.1.50:7912  # ← REQUIRED: your Spoolman instance
# spoolman_rfid_key: rfid      # extra field name in Spoolman (default: rfid)
# spoolman_timeout:  5.0       # HTTP request timeout in seconds (default 5.0)
# spoolman_cache_ttl: 300      # seconds to cache UID→spool_id lookups (default 300)
#
# poll_interval:     30        # seconds between scans (default 30)
# absent_threshold:  3         # missed polls before REMOVED fires (default 3)
# transceive_delay:  0.250     # wait (s) after InListPassiveTarget (default 0.250)
# crc_delay:         0.050     # wait (s) after InRelease (default 0.050)
# debug:             1         # 0=quiet  1=events  2=full I2C trace  (default 1)
