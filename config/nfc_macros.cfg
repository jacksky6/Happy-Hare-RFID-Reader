# =============================================================================
# EMU NFC Gate Reader — Happy Hare Integration Macros
# =============================================================================
# Include this file from printer.cfg alongside the supported hardware config:
#
#   [include NFC/nfc_vars.cfg]
#   [include NFC/nfc_macros.cfg]
#   [include NFC/pn532_i2C.cfg]
#
# Customise the GCode bodies here to match your Happy Hare version.  Do not put
# Happy Hare calls in PN532Driver or SpoolmanClient.
#
# Parameters passed by the nfc_gates / nfc_gate module:
#   _NFC_SPOOL_CHANGED : GATE (int)  SPOOL_ID (int)  UID (hex string)
#   _NFC_SPOOL_REMOVED : GATE (int)
#   _NFC_TAG_NO_SPOOL  : GATE (int)  UID (hex string)
#
# Integration model:
#   NFC_Manager reads the tag UID, asks SpoolmanClient to resolve it to a spool,
#   then dispatches these macros.  This macro file is the Happy Hare handoff.
#   Happy Hare's local gate map is maintained as the source of truth.  In
#   Happy Hare "spoolman_support: push" mode, update the local map first with
#   MMU_GATE_MAP.  The SYNC=1 parameter lets Happy Hare synchronize that local
#   assignment to Spoolman when Spoolman support is enabled.
#   NFC_Manager also updates the Spoolman spool location field directly:
#      location = MMU_GATE_<gate>
#   That location update is what Spoolman/Moonraker/Fluidd-style widgets can
#   use to show gate placement.
#   _NFC_TAG_NO_SPOOL fires when a tag is detected but its UID is not registered
#   in Spoolman (the "rfid" extra field is missing or doesn't match).
# =============================================================================

[gcode_macro _NFC_SPOOL_CHANGED]
description: Called by nfc_gates/nfc_gate when a spool NFC tag is placed on a gate
gcode:
    {% set gate     = params.GATE     | int %}
    {% set spool_id = params.SPOOL_ID | int %}
    {% set uid      = params.UID %}
    { action_respond_info("😊 NFC gate %d: spool %d detected (UID %s). Sending to Happy Hare." % (gate, spool_id, uid)) }
    # Maintain Happy Hare's local runtime gate map and let Happy Hare sync it.
    MMU_GATE_MAP GATE={gate} SPOOLID={spool_id} AVAILABLE=1 SYNC=1 QUIET=1
    MMU_GATE_MAP GATE={gate} APPLY=1


[gcode_macro _NFC_SPOOL_REMOVED]
description: Called by nfc_gates/nfc_gate when a spool NFC tag is removed from a gate
gcode:
    {% set gate = params.GATE | int %}
    {% set mmu_action = printer.mmu.action | default("") | lower %}
    {% if "load" in mmu_action or "unload" in mmu_action or "homing" in mmu_action %}
        { action_respond_info("NFC gate %d: tag absent during MMU operation (%s) — ignoring removal." % (gate, mmu_action)) }
    {% else %}
        { action_respond_info("🧹 NFC gate %d: spool removed. Clearing Happy Hare gate." % gate) }
        MMU_GATE_MAP GATE={gate} SPOOLID=-1 AVAILABLE=0 SYNC=1 QUIET=1
        MMU_GATE_MAP GATE={gate} APPLY=1
    {% endif %}


[gcode_macro NFC_HH_SYNC_CACHE]
description: Re-seed NFC lane cache from Happy Hare gate map
# Reads the current Happy Hare gate map and tells each NFC lane about its
# current spool assignment.  On the next poll, if the NFC reader sees the same
# spool that HH already knows about, the dispatch is suppressed (no redundant
# MMU_GATE_MAP call).  Call this after a Klipper restart if startup_polling is
# manual, or any time you want to re-align the NFC cache with HH state.
#
# Note: startup seeding happens automatically in Python (_delayed_init).
# This macro exists for user-triggered re-sync and for cases where the Python
# seed failed (e.g. HH was not yet initialised at PN532 init time).
gcode:
    {% set num      = printer.mmu.num_gates | int %}
    {% set spool_ids = printer.mmu.gate_spool_id %}
    {% set statuses  = printer.mmu.gate_status %}
    RESPOND PREFIX="NFC" MSG="Syncing NFC cache from Happy Hare gate map ({num} gates)..."
    {% for i in range(num) %}
        {% set spool_id = spool_ids[i] | default(-1) | int %}
        {% set status   = statuses[i]  | default(0)  | int %}
        RESPOND PREFIX="NFC" MSG="  gate {i} → lane{i}  spool_id={spool_id}  status={status}"
        NFC_GATE GATE={i} HH_SYNC=1 SPOOL_ID={spool_id}
    {% endfor %}
    RESPOND PREFIX="NFC" MSG="Sync complete. Run NFC_GATE GATE=N READ=1 to start polling."


[gcode_macro _NFC_TAG_NO_SPOOL]
description: Called when a tag is detected but its UID is not registered in Spoolman
gcode:
    {% set gate = params.GATE | int %}
    {% set uid  = params.UID %}
    { action_respond_info(
        "NFC gate %d: tag UID %s is not registered in Spoolman.\n"
        "Open the spool record in Spoolman, set the 'rfid' extra field to: %s" %
        (gate, uid, uid)) }
    # Optionally clear the gate until the UID is registered:
    # MMU_GATE_MAP GATE={gate} SPOOLID=-1 SYNC=1 QUIET=1
