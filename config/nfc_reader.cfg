# =============================================================================
# EMU NFC Gate Reader — User Settings
# =============================================================================
# Supported documented path:
#   PN532 over I2C on each lane MCU / EBB42 board.
#
# Include order in printer.cfg:
#   [include nfc/nfc_reader.cfg]
#   [include nfc/nfc_macros.cfg]
#   [include nfc/nfc_reader_hw.cfg]
#
# This file defines the base [nfc_gate] section.  Each [nfc_gate laneN]
# section in nfc_reader_hw.cfg inherits these values unless it overrides them.
# =============================================================================

[nfc_gate]

# PN532 default I2C address: decimal 36 == hex 0x24.
i2c_address:         36
i2c_bus:                 i2c2_PB10_PB11         # SLB configuration
#i2c_bus:                 i2c3_PB3_PB4           # EBB42 configuration 

# ── Spoolman ──────────────────────────────────────────────────────────────────
# Use "auto" to read Moonraker's Spoolman configuration, or set a direct URL:
#   spoolman_url: http://192.168.1.50:7912
spoolman_url:        auto

# Spoolman spool extra field that stores the NFC tag UID.
spoolman_rfid_key:   rfid_tag

# HTTP request timeout in seconds.
spoolman_timeout:    5.0

# Seconds to cache a successful UID -> spool lookup.  0 disables cache.
spoolman_cache_ttl:  300

# ── Tag data resolution ──────────────────────────────────────────────────────
# Choose how tags are resolved:
#
#   tag_parsing: False  -> resolve by UID through Spoolman only
#   tag_parsing: True   -> enable rich RFID content reads when supported
#
# Rich read supports NTAG/Type-2 metadata and authenticated Bambu/MIFARE reads.
# Bambu rich reads require pycryptodome in the Klipper Python environment.
tag_parsing:         False

# Allow authenticated Bambu factory-spool reads when tag_parsing is True.
# Leave False unless pycryptodome is installed in the Klipper Python environment.
bambu_reads:         False

# When rich RFID reads produce filament metadata that does not already map to a
# Spoolman spool, allow the plugin to auto-create a new spool record.
spoolman_auto_create: False

# Fallback NTAG user-page window for non-NDEF/binary tags.
# NDEF text/JSON tags are read dynamically from the NDEF TLV length header.
# Default 16 covers the common fixed-size binary formats without extra I2C.
#tag_max_pages: 16

# ── Polling ───────────────────────────────────────────────────────────────────
# Startup polling behavior:
#   -1  manual start only (default, safest)
#    0  explicitly disabled on startup
#    1  start polling automatically after PN532 init succeeds
startup_polling:    1

# Seconds to wait before the first automatic poll when startup_polling=1.
# Override per [nfc_gate laneN] to stagger lane startup and avoid all readers
# entering the first poll cycle at the same time.
startup_poll_delay: 0.0

# How often to scan each gate.
poll_interval:       10

# Consecutive missed polls before a spool is declared removed.
# With poll_interval=30 and absent_threshold=3, removal takes about 90 seconds.
absent_threshold:    3

# ── PN532 timing ──────────────────────────────────────────────────────────────
# Delay around PN532 passive target commands.
transceive_delay:    0.250

# Delay after target release before the next command.
crc_delay:           0.050

# ── Logging ───────────────────────────────────────────────────────────────────
# NFC-specific log file. Relative names resolve under Klipper's log directory.
log_file:            nfc_reader.log

# Log verbosity written to log_file.  Higher number = more output.
#
#   0   — no logging
#   1   — errors only
#   2   — warnings and errors          [recommended for normal use]
#   3   — state changes, Spoolman lookups, HH handoff
#   4   — full I2C protocol trace (verbose — use only when diagnosing)
debug:               2

# Optional Fluidd/Mainsail console output.
# Errors always go to the console once the module has loaded.
# Set console_output: True to also send info/warning messages to the console.
console_output:      False

# Controls which messages appear in the Fluidd/Mainsail console when console_output is True.
# Higher number = more output.  Accepted values:
#
#   1  — errors only
#   2  — warnings and errors          [recommended for normal use]
#   3  — state changes, Spoolman lookups, HH handoff
#   4  — full I2C protocol trace (verbose)
#
# For initial setup / real-time debugging:  console_output: True   console_log_level: 3
# For normal printing:                      console_output: False  console_log_level: 2
console_log_level:   2

# ── Scan-and-jog mode ─────────────────────────────────────────────────────────
# When a spool is manually loaded and Happy Hare parks filament at the gate
# (gate_status 0→1, MMU idle, not printing), the NFC tag may be off-axis and
# out of read range.  Scan-and-jog spins the spool in small steps until the
# tag is found, then rewinds to the parked position.
#
# Set scan_enabled to False to disable this feature entirely.
scan_enabled:        True

# Filament advance per jog step (mm).  Smaller steps find the tag more
# precisely but take more iterations; larger steps are faster but may overshoot.
# best to keep this value lower than the width of the reader, this gives a 3 cm window
# on each side of the reader, plus the width of the reader to maximize the read window
scan_jog_mm:         75.0

# Seconds between NFC read attempts while scan-jog is active.  Jog chunk cadence
# is calculated automatically from scan_jog_mm / Happy Hare gear_short_move_speed
# so there is no manual move interval to tune.
scan_poll_interval:  0.25

# ── Expert-only PN532 I2C debugging ───────────────────────────────────────────
# Exposes manual PN532 console-style STEP commands plus RAW_READ, RAW_WRITE,
# RAW_CMD, READY_READ, and ACK_READ through NFC.
# Leave disabled for normal printing.
low_level_debug:     False
