# EMU NFC GATE READER USER SETTINGS -------------------------------------------
# Supported documented path:
#   NFC reader over I2C on each lane MCU / EBB42 board.
#   PN532 is the default reader; PN7160 is also supported.
#
# Include order in printer.cfg:
#   [include nfc/nfc_reader.cfg]
#   [include nfc/nfc_macros.cfg]
#   [include nfc/nfc_reader_hw.cfg]
#
# This file defines the base [nfc_gate] section.  Each [nfc_gate laneN]
# section in nfc_reader_hw.cfg inherits these values unless it overrides them.
[nfc_gate]

# NFC reader chip type. Supported: pn532, pn7160.
# PN532 is the default documented path.
reader_type:         pn532

# PN532 default I2C address: decimal 36 == hex 0x24.
# PN7160 valid I2C addresses are decimal 40-43 == hex 0x28-0x2B.
i2c_address:         36
i2c_bus:                 i2c2_PB10_PB11          # SLB configuration
#i2c_bus:                 i2c3_PB3_PB4           # EBB42 configuration 

# SPOOLMAN --------------------------------------------------------------------
# ███████╗ ██████╗   ██████╗   ██████╗  ██╗      ███╗   ███╗  █████╗  ███╗   ██╗
# ██╔════╝ ██╔══██╗ ██╔═══██╗ ██╔═══██╗ ██║      ████╗ ████║ ██╔══██╗ ████╗  ██║
# ███████╗ ██████╔╝ ██║   ██║ ██║   ██║ ██║      ██╔████╔██║ ███████║ ██╔██╗ ██║
# ╚════██║ ██╔═══╝  ██║   ██║ ██║   ██║ ██║      ██║╚██╔╝██║ ██╔══██║ ██║╚██╗██║
# ███████║ ██║      ╚██████╔╝ ╚██████╔╝ ███████╗ ██║ ╚═╝ ██║ ██║  ██║ ██║ ╚████║
# ╚══════╝ ╚═╝       ╚═════╝   ╚═════╝  ╚══════╝ ╚═╝     ╚═╝ ╚═╝  ╚═╝ ╚═╝  ╚═══╝
# Use "auto" to read Moonraker's Spoolman configuration, set a direct URL,
# or set "disabled" to skip Spoolman lookup and use tag metadata directly
# when tag_parsing is enabled.
#
#   spoolman_url: auto
#   spoolman_url: http://192.168.1.50:7912
#   spoolman_url: disabled
spoolman_url:        auto

# Spoolman spool extra field that stores the NFC tag UID.
spoolman_rfid_key:   rfid_tag

# HTTP request timeout in seconds.
spoolman_timeout:    5.0

# Seconds to cache a successful UID -> spool lookup.  0 disables cache.
spoolman_cache_ttl:  300

# TAG DATA RESOLUTION ---------------------------------------------------------
# ████████╗  █████╗   ██████╗     ██████╗   █████╗  ████████╗  █████╗ 
# ╚══██╔══╝ ██╔══██╗ ██╔════╝     ██╔══██╗ ██╔══██╗ ╚══██╔══╝ ██╔══██╗
#    ██║    ███████║ ██║  ███╗    ██║  ██║ ███████║    ██║    ███████║
#    ██║    ██╔══██║ ██║   ██║    ██║  ██║ ██╔══██║    ██║    ██╔══██║
#    ██║    ██║  ██║ ╚██████╔╝    ██████╔╝ ██║  ██║    ██║    ██║  ██║
#    ╚═╝    ╚═╝  ╚═╝  ╚═════╝     ╚═════╝  ╚═╝  ╚═╝    ╚═╝    ╚═╝  ╚═╝
# Choose how tags are resolved:
#
#   tag_parsing: False  -> resolve by UID through Spoolman only
#   tag_parsing: True   -> enable rich RFID content reads when supported
#
# Rich read supports NTAG/Type-2 metadata and authenticated Bambu/MIFARE reads.
# Bambu rich reads require pycryptodome in the Klipper Python environment.
tag_parsing:         False

# Allow authenticated Bambu factory-spool reads when tag_parsing is True.
# Leave False unless pycryptodome is installed in the Klipper Python environment.
bambu_reads:         False

# When rich RFID reads produce filament metadata that does not already map to a
# Spoolman spool, allow the plugin to auto-create a new spool record.
spoolman_auto_create: False

# Fallback NTAG user-page window for non-NDEF/binary tags.
# NDEF text/JSON tags are read dynamically from the NDEF TLV length header.
# Default 16 covers the common fixed-size binary formats without extra I2C.
#tag_max_pages: 16

# POLLING ---------------------------------------------------------------------
# ██████╗   ██████╗  ██╗      ██╗      ██╗ ███╗   ██╗  ██████╗ 
# ██╔══██╗ ██╔═══██╗ ██║      ██║      ██║ ████╗  ██║ ██╔════╝ 
# ██████╔╝ ██║   ██║ ██║      ██║      ██║ ██╔██╗ ██║ ██║  ███╗
# ██╔═══╝  ██║   ██║ ██║      ██║      ██║ ██║╚██╗██║ ██║   ██║
# ██║      ╚██████╔╝ ███████╗ ███████╗ ██║ ██║ ╚████║ ╚██████╔╝
# ╚═╝       ╚═════╝  ╚══════╝ ╚══════╝ ╚═╝ ╚═╝  ╚═══╝  ╚═════╝ 
# Startup polling behavior:
#   -1  manual start only (default, safest)
#    0  explicitly disabled on startup
#    1  start polling automatically after reader init succeeds
startup_polling:    1

# Seconds to wait before the first automatic poll when startup_polling=1.
# Override per [nfc_gate laneN] to stagger lane startup and avoid all readers
# entering the first poll cycle at the same time.
startup_poll_delay: 0.0

# Per-lane background poll interval (seconds). Lane readers use this for normal
# tag checks and absent/removal timing. Shared readers do not use this for read
# cadence; they use scan_poll_interval below.
poll_interval:       10

# Consecutive missed polls before a spool is declared removed.
# With poll_interval=30 and absent_threshold=3, removal takes about 90 seconds.
absent_threshold:    3

# PN532 TIMING ----------------------------------------------------------------
# Delay around PN532 passive target commands.
transceive_delay:    0.250

# Delay after target release before the next command.
crc_delay:           0.050

# LOGGING ---------------------------------------------------------------------
# ██╗       ██████╗   ██████╗   ██████╗  ██╗ ███╗   ██╗  ██████╗ 
# ██║      ██╔═══██╗ ██╔════╝  ██╔════╝  ██║ ████╗  ██║ ██╔════╝ 
# ██║      ██║   ██║ ██║  ███╗ ██║  ███╗ ██║ ██╔██╗ ██║ ██║  ███╗
# ██║      ██║   ██║ ██║   ██║ ██║   ██║ ██║ ██║╚██╗██║ ██║   ██║
# ███████╗ ╚██████╔╝ ╚██████╔╝ ╚██████╔╝ ██║ ██║ ╚████║ ╚██████╔╝
# ╚══════╝  ╚═════╝   ╚═════╝   ╚═════╝  ╚═╝ ╚═╝  ╚═══╝  ╚═════╝ 
# NFC-specific log file. Relative names resolve under Klipper's log directory.
log_file:            nfc_reader.log

# Log verbosity written to log_file.  Higher number = more output.
#
#   0   — no logging
#   1   — errors only
#   2   — warnings and errors          [recommended for normal use]
#   3   — state changes, Spoolman lookups, HH handoff
#   4   — full I2C protocol trace (verbose — use only when diagnosing)
debug:               2

# Optional Fluidd/Mainsail console output.
# Errors always go to the console once the module has loaded.
# Set console_output: True to also send info/warning messages to the console.
console_output:      False

# Controls which messages appear in the Fluidd/Mainsail console when console_output is True.
# Higher number = more output.  Accepted values:
#
#   1  — errors only
#   2  — warnings and errors          [recommended for normal use]
#   3  — state changes, Spoolman lookups, HH handoff
#   4  — full I2C protocol trace (verbose)
#
# For initial setup / real-time debugging:  console_output: True   console_log_level: 3
# For normal printing:                      console_output: False  console_log_level: 2
console_log_level:   2

# SCAN AND JOG MODE -----------------------------------------------------------
# ███████╗  ██████╗  █████╗  ███╗   ██╗         ██╗  ██████╗   ██████╗ 
# ██╔════╝ ██╔════╝ ██╔══██╗ ████╗  ██║         ██║ ██╔═══██╗ ██╔════╝ 
# ███████╗ ██║      ███████║ ██╔██╗ ██║         ██║ ██║   ██║ ██║  ███╗
# ╚════██║ ██║      ██╔══██║ ██║╚██╗██║    ██   ██║ ██║   ██║ ██║   ██║
# ███████║ ╚██████╗ ██║  ██║ ██║ ╚████║    ╚█████╔╝ ╚██████╔╝ ╚██████╔╝
# ╚══════╝  ╚═════╝ ╚═╝  ╚═╝ ╚═╝  ╚═══╝     ╚════╝   ╚═════╝   ╚═════╝ 
# When Happy Hare parks a newly loaded filament at the gate, the spool hub may
# stop with the NFC tag out of reader range. Scan-and-jog rotates the spool in
# small gear moves, reads at stopped positions, then rewinds to the parked
# position before handing the detected spool/tag back to Happy Hare.
#
# There are four common NFC/Happy Hare preload setups:
#
#   1. NFC gate-status polling:
#      Leave scan_enabled: True. NFC watches Happy Hare gate_status for a
#      0->1 loaded transition, waits for HH idle, runs the all-lanes
#      parked/empty preflight, then starts scan-jog automatically. Use this
#      for lane readers when you want NFC to detect the preload from polling.
#
#   2. Happy Hare post-preload hook:
#      Configure Happy Hare:
#          variable_user_post_preload_extension: '_NFC_SCAN_JOG_PRELOAD'
#      The macro calls NFC GATE=<n> JOG_SCAN=1. Happy Hare appends GATE=<n>
#      when the hook runs; NFC starts the configured scan-jog LED effect from
#      Python before motion begins. In this mode, set scan_enabled: False so
#      NFC does not also edge-trigger from polling.
#      Manual/hook-triggered NFC GATE=<n> JOG_SCAN=1 still works when
#      scan_enabled is False.
#
#   3. Shared reader post-preload hook:
#      Configure Happy Hare:
#          variable_user_post_preload_extension: '_NFC_SHARED_PRELOAD'
#      In this mode, set scan_enabled: False. The shared reader handles the
#      preload approval/commit path, and lane-reader scan-jog polling should
#      not also run for the same preload event.
#
#   4. Hybrid lane readers plus shared-reader bypass:
#      Configure Happy Hare:
#          variable_user_post_preload_extension: '_NFC_SHARED_PRELOAD'
#      Leave scan_enabled: True when lane readers are used for all normal
#      lanes and the shared reader may be used for bypass/preload approval or 
#      lanes that do not have lane readers.
#      Lane readers keep using the polling-based scan-jog path, while the shared
#      reader uses the post-preload hook. If a loaded gate has both a lane
#      reader and shared-reader handling, both paths can react to the same
#      preload event.
#
# scan_enabled only controls NFC's automatic gate_status edge trigger. It does
# not disable the JOG_SCAN command itself.
scan_enabled:        False

# Filament advance per jog step (mm). Smaller steps sample more positions and
# are less likely to skip over the tag, but take longer to scan. Larger steps
# scan faster but may jump past the best NFC read position.
#
# For UID-only reads, 100-200 can be reasonable, there is a micro jog set up that
# will divide this parameter by 3, for step--> read --> step --> read.
# For rich reads such as Bambu/MIFARE, use a smaller step such as 75mm so the 
# tag spends more time near the reader's strongest field.
scan_jog_mm:         150.0

# Optional maximum scan-jog travel distance. If set, NFC uses this value and
# does not read Happy Hare's saved Bowden calibration. A full spool circumference
# is roughly 480mm.
#
# Leave commented to keep trying until the active gate's Bowden calibration
# length is reached.
#scan_jog_max:       480.0


# Reserved parking buffer for Happy Hare's final gate-settle behavior after
# scan-jog. Current scan-jog rewinds the NFC-driven motion before dispatching
# the found tag/spool; keep this value at the default unless you are testing a
# Happy Hare parking integration that explicitly uses the buffer.
scan_rewind_buffer_mm: 30.0

# If a rich tag read finds the UID but reports incomplete payload data, scan-jog
# can probe nearby positions before accepting the current UID/metadata result.
# This helps spool-mounted MIFARE/Bambu tags that stop on the edge of the reader
# field: the UID may be readable, but later authenticated block reads may fail.
#
# scan_decode_retry_mm is the distance between retry positions.
# scan_decode_retry_rounds is the number of left/right retry rounds.
#
# Example with mm=2.0 and rounds=5: retry offsets are
# +2, -2, +4, -4, +6, -6, +8, -8, +10, -10mm
#
# Each retry move is clamped to the scan range, and all retry movement is added
# to the final rewind distance. If all retries still report incomplete data, NFC
# accepts the current result just like it did before retry support.
scan_decode_retry_mm:     2.0
scan_decode_retry_rounds: 5


# NFC divides each scan_jog_mm chunk into three smaller blocking MMU_TEST_MOVE
# substeps, then reads at each stopped spool position. scan_reads_per_position
# controls how many reads are attempted at each stop before advancing to the
# next substep; higher values improve reliability for marginal tag alignment
# but add scan time. scan_poll_interval is the delay (seconds) between those
# consecutive read attempts — it is not a read-while-moving interval, because
# MMU_TEST_MOVE blocks until each substep completes before reads begin.
#
# Shared reader note: [nfc_gate shared] also uses scan_poll_interval as its
# active polling cadence. It does not use poll_interval above. Lower values make
# shared tag detection more responsive while NFC_SHARED READ=1/startup polling
# is active.
scan_reads_per_position: 1
scan_poll_interval:  0.25

# Experimental continuous scan mode. The default "stopped" mode above keeps the
# existing behavior: blocking MMU_TEST_MOVE substeps with reads at stopped spool
# positions. Set scan_motion_mode: continuous to queue non-blocking WAIT=0 gear
# moves instead. Continuous mode changes only the forward search jog; tag-found
# actions, the 0.1s read-light hold, rewind, and completion logic stay unchanged.
#
# With the values below, each 50mm chunk takes about 0.408s to move, then NFC
# waits 0.05s to read/check before queueing the next chunk. Effective scan
# advance is roughly 109mm/s.
scan_motion_mode: stopped
scan_continuous_step_mm: 50.0
scan_continuous_speed: 150.0
scan_continuous_accel: 2000.0
scan_continuous_poll_interval: 0.05

# LED EFFECTS -----------------------------------------------------------------
# ██╗     ███████╗ ██████╗
# ██║     ██╔════╝ ██╔══██╗
# ██║     █████╗   ██║  ██║
# ██║     ██╔══╝   ██║  ██║
# ███████╗███████╗ ██████╔╝
# ╚══════╝╚══════╝ ╚═════╝
# Each value is the [mmu_led_effect] base name. The plugin appends _exit_N
# for the active gate so only that gate's LED changes. Effects must be defined
# with define_on: gates (or define_on: gates, exit) so Klipper generates the
# per-gate variants automatically.
#
# Set to an empty string to disable an effect:
#   scan_searching_effect:
#
# Scan-jog effects — fired in order as the scan progresses:
scan_searching_effect:    mmu_RFID_searching   # forward jog looking for tag
scan_tag_read_effect:     mmu_RFID_read        # tag confirmed
scan_rewind_effect:       mmu_RFID_rewinding   # rewinding to parked position

# Spool-resolution effects — fired during Spoolman lookup:
lane_auto_create_effect:  mmu_RFID_creating    # Spoolman auto-create in progress
lane_unresolved_effect:   mmu_RFID_unresolved  # tag found but no spool match

# EXPERT ONLY PN532 I2C DEBUGGING ---------------------------------------------
# Exposes manual PN532 console-style STEP commands plus RAW_READ, RAW_WRITE,
# RAW_CMD, READY_READ, and ACK_READ through NFC.
# Leave disabled for normal printing.
low_level_debug:     False
