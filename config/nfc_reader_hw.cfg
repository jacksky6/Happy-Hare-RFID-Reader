# =============================================================================
# ================= EMU NFC GATE READER - NFC I2C LANE HARDWARE ================
# =============================================================================
# Supported documented path:
#   one NFC reader module per lane MCU / EBB42 board.
#   PN532 is the default reader; PN7160 may be selected per lane with
#   reader_type: pn7160. RC522 may be selected with reader_type: rc522 for
#   SPI UID reads and NTAG/Type-2 rich reads.
#
# Include after nfc_reader.cfg and nfc_macros.cfg:
#   [include nfc/nfc_reader.cfg]
#   [include nfc/nfc_macros.cfg]
#   [include nfc/nfc_reader_hw.cfg]
#
# The base [nfc_gate] section in nfc_reader.cfg defines defaults for all
# lanes. Each [nfc_gate laneN] section below inherits those keys automatically.
# Override a key in a lane section only when that lane needs a different value.
# Example:
#   [nfc_gate]
#   reader_type: pn532
#   i2c_address: 36
#   i2c_bus:     i2c3_PB3_PB4
#   scan_enabled: False
#
#   [nfc_gate lane1]
#   mmu_gate:     1
#   i2c_mcu:      lane1
#   reader_type:  pn532
#   scan_enabled: True
#
# Address note:
#   PN532 has a fixed I2C address, so lanes normally inherit i2c_address: 36
#   from the base [nfc_gate] section.
#
#   PN7160 can use multiple I2C addresses selected by hardware address pins or
#   DIP switches. In the common EMU layout, each lane has its own MCU/I2C bus,
#   so all PN7160 lanes may use the same inherited address. If multiple PN7160
#   readers share one MCU/I2C bus, give each reader a unique i2c_address in its
#   [nfc_gate laneN] section, for example:
#
#     reader_type:  pn7160
#     i2c_address:  40     # 0x28; other PN7160 addresses may be 41-43
#
# RC522 note:
#   RC522 can be used per lane if that lane section provides Klipper SPI
#   settings (`cs_pin`, `spi_bus`/software SPI pins) instead of
#   i2c_address/i2c_bus.
#   See nfc_reader_shared.cfg for a copyable RC522 shared-reader example.
#
#   Example RC522 lane override:
#
#     [nfc_gate lane1]
#     enabled:      True
#     mmu_gate:     1
#     i2c_mcu:      mmu1
#     reader_type:  rc522
#     cs_pin:       mmu1:PA4
#     spi_bus:      spi1
#     spi_speed:    500000  # hardware SPI default; use 100000 for software SPI
#     #rc522_transceive_delay: 0.035
#
# Each [nfc_gate laneN] section maps:
#   Happy Hare gate number -> Klipper lane MCU -> NFC reader hardware.
# startup_poll_delay staggers automatic startup polling so all readers do not
# enter their first poll cycle at the same time.
# Each [mmu_nfc_endstop laneN] section seeds Happy Hare with a homeable virtual
# endstop that uses the matching lane reader. Use ENDSTOP=nfc_laneN in Happy
# Hare homing/test moves.
#
# Happy Hare V4 / multi-unit example:
#   Section names are labels only. The nfc_gate reference binds the virtual
#   endstop to its reader, while mmu_gate is Happy Hare's global gate number.
#   For example, the first physical lane of unit0 can be configured as:
#
#     [nfc_gate unit0_lane0]
#     enabled:                True
#     mmu_gate:                0
#     i2c_mcu:                 unit0_gate0
#     startup_poll_delay:      0.0
#
#     [mmu_nfc_endstop unit0_lane0]
#     nfc_gate:                unit0_lane0
#     endstop_name:            nfc_unit0_lane0
#     poll_interval:           0.05
#     register_sensor:         True
#
#   A second unit's first lane might use mmu_gate: 4. Happy Hare V4 resolves
#   that global gate to the correct unit drive automatically.
# Set enabled: False on a lane to keep the template in place without creating
# the I2C reader, registering the GCode mux command, or initializing hardware.
#
# i2c_mcu: is consumed by Klipper's I2C bus layer (MCU_I2C_from_config),
# not read explicitly by the plugin.  The MCU name must already exist in
# Klipper / Happy Hare config.  Example: [mcu lane0], [mcu lane1], etc.
#
# [WARN] After updating Klipper, rebuild and flash the lane MCU / EBB42 firmware.
# Updating the host alone is not enough for NFC reader I2C troubleshooting.
# =============================================================================

# =============================================================================
# ================================= LANE 0 =====================================
# =============================================================================
[nfc_gate lane0]
enabled:                True
mmu_gate:                0
i2c_mcu:                 mmu0
startup_poll_delay:      0.0

[mmu_nfc_endstop lane0]
nfc_gate:                lane0
endstop_name:            nfc_lane0
poll_interval:           0.05
register_sensor:         True

# =============================================================================
# ================================= LANE 1 =====================================
# =============================================================================
[nfc_gate lane1]
enabled:                True
mmu_gate:                1
i2c_mcu:                 mmu1
startup_poll_delay:      0.5

[mmu_nfc_endstop lane1]
nfc_gate:                lane1
endstop_name:            nfc_lane1
poll_interval:           0.05
register_sensor:         True

# =============================================================================
# ================================= LANE 2 =====================================
# =============================================================================
[nfc_gate lane2]
enabled:                True
mmu_gate:                2
i2c_mcu:                 mmu2
startup_poll_delay:      1.0

[mmu_nfc_endstop lane2]
nfc_gate:                lane2
endstop_name:            nfc_lane2
poll_interval:           0.05
register_sensor:         True

# =============================================================================
# ================================= LANE 3 =====================================
# =============================================================================
[nfc_gate lane3]
enabled:                True
mmu_gate:                3
i2c_mcu:                 mmu3
startup_poll_delay:      1.5

[mmu_nfc_endstop lane3]
nfc_gate:                lane3
endstop_name:            nfc_lane3
poll_interval:           0.05
register_sensor:         True

# =============================================================================
# ================================= LANE 4 =====================================
# =============================================================================
[nfc_gate lane4]
enabled:               True
mmu_gate:               4
i2c_mcu:                mmu4
startup_poll_delay:     2.0

[mmu_nfc_endstop lane4]
nfc_gate:               lane4
endstop_name:           nfc_lane4
poll_interval:          0.05
register_sensor:        True

# =============================================================================
# ============================= LANE 5 EXAMPLE =================================
# =============================================================================
# [nfc_gate lane5]
# enabled:                False
# mmu_gate:               5
# i2c_mcu:                mmu5
# startup_poll_delay:     2.5
#
# [mmu_nfc_endstop lane5]
# nfc_gate:                lane5
# endstop_name:            nfc_lane5
# poll_interval:           0.05
# register_sensor:         True

# =============================================================================
# ============= HYBRID INSTALL: ADDING A SHARED READER TO LANES ================
# =============================================================================
# If you want a single shared reader inside the MMU body in addition to the
# per-lane readers above, add this to printer.cfg:
#
#   [include nfc/nfc_reader_shared.cfg]
#
# Then edit ~/printer_data/config/nfc/nfc_reader_shared.cfg to set i2c_mcu,
# i2c_bus, and i2c_address for the shared NFC reader.  The template file is at
# config/nfc_reader_shared.cfg in the NFC-Reader repo.
#
# Wire the Happy Hare post-preload hook in mmu_macro_vars.cfg:
#   variable_user_post_preload_extension: '_NFC_SHARED_PRELOAD'
#
# See docs/shared/shared-reader.md for the full hybrid setup guide.
