# =============================================================================
# EMU NFC Gate Reader — PN532 I2C Lane Hardware
# =============================================================================
# Supported documented path:
#   one PN532 module per lane MCU / EBB42 board.
#
# Include after nfc_vars.cfg and nfc_macros.cfg:
#   [include NFC/nfc_vars.cfg]
#   [include NFC/nfc_macros.cfg]
#   [include NFC/pn532_i2C.cfg]
#
# Each [nfc_gate laneN] section maps:
#   Happy Hare gate number -> Klipper lane MCU -> PN532 hardware I2C bus.
#
# The lane MCU names must already exist in Klipper / Happy Hare config.
# Example: [mcu lane0], [mcu lane1], etc.
#
# ⚠️ After updating Klipper, rebuild and flash the lane MCU / EBB42 firmware.
# Updating the host alone is not enough for PN532 I2C troubleshooting.
# =============================================================================

# ── Lane 0 ────────────────────────────────────────────────────────────────────
[nfc_gate lane0]
mmu_gate:                0
i2c_mcu:                 lane0

# ── Lane 1 ────────────────────────────────────────────────────────────────────
[nfc_gate lane1]
mmu_gate:                1
i2c_mcu:                 lane1

# ── Lane 2 ────────────────────────────────────────────────────────────────────
[nfc_gate lane2]
mmu_gate:                2
i2c_mcu:                 lane2

# ── Lane 3 ────────────────────────────────────────────────────────────────────
[nfc_gate lane3]
mmu_gate:                3
i2c_mcu:                 lane3

# ── Lane 4  ────────────────────────────────────────────────────────────
[nfc_gate lane4]
mmu_gate:               4
i2c_mcu:                lane4

# ── Lane 5 example  ────────────────────────────────────────────────────────────
# [nfc_gate lane5]
# mmu_gate:               5
# i2c_mcu:                lane5
