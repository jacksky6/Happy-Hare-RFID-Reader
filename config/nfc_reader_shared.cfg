# =============================================================================
# =================== EMU NFC GATE READER - SHARED NFC HARDWARE ================
# =============================================================================
# This file configures the optional shared NFC reader mounted inside the MMU
# body, not tied to any specific lane. The default reader_type is pn532; set
# reader_type: pn7160 below when the shared reader hardware is PN7160.
#
# =============================================================================
# =========================== WHY A SEPARATE FILE ==============================
# =============================================================================
# The shared reader lives in its own file so it can be added to any install
# without touching nfc_reader_hw.cfg.  Per-lane readers stay in
# nfc_reader_hw.cfg; the shared reader lives here.  For a hybrid install you
# just add one more [include] line — no merging, no commenting out sections.
#
# =============================================================================
# =============================== HOW TO USE ===================================
# =============================================================================
# Pure shared-reader install (no per-lane readers) — replace nfc_reader_hw.cfg:
#   [include nfc/nfc_reader.cfg]
#   [include nfc/nfc_macros.cfg]
#   [include nfc/nfc_reader_shared.cfg]
#
# Hybrid install (per-lane readers + shared reader) — add alongside:
#   [include nfc/nfc_reader.cfg]
#   [include nfc/nfc_macros.cfg]
#   [include nfc/nfc_reader_hw.cfg]
#   [include nfc/nfc_reader_shared.cfg]
#
# =============================================================================
# ================================ WORKFLOW ====================================
# =============================================================================
# 1. Tap your spool tag on the shared reader — NFC resolves to a Spoolman ID
#    and holds it as pending.
# 2. Drop the spool into an MMU lane and push the filament to the pregate sensor.
# 3. Happy Hare fires user_post_preload_extension → _NFC_SHARED_PRELOAD →
#    NFC_SHARED PRELOAD_CHECK/COMMIT validates the pending spool and clears it
#    after Happy Hare assigns the staged NEXT_SPOOLID to the loaded gate.
#
# Wire the Happy Hare post-preload hook in mmu_macro_vars.cfg:
#   variable_user_post_preload_extension: '_NFC_SHARED_PRELOAD'
# Do not use the per-lane hook here:
#   variable_user_post_preload_extension: 'NFC JOG_SCAN=1'
#
# =============================================================================
# ================================ HARDWARE ====================================
# =============================================================================
# Run install.sh to fill in hardware values automatically, or edit reader_type,
# i2c_mcu, i2c_bus, and i2c_address below to match your wiring.
#
# [WARN] After updating Klipper, rebuild and flash the MCU hosting the NFC reader.
#    The MCU must be on the same Klipper version as the host.
#
# Full setup guide: docs/shared/shared-reader.md
# =============================================================================

[nfc_gate shared]
enabled:                True
# reader_type:            pn532  # For PN7160 hardware, use: pn7160
# i2c_address:            36     # PN7160 valid addresses are 40-43 (0x28-0x2B)
i2c_mcu:                mmu
shared:                 true
startup_polling:        1

# Shared polling read cadence comes from scan_poll_interval in nfc_reader.cfg
# (default 0.25s), not poll_interval.  poll_interval remains for per-lane
# readers and their absent/removal timing.

# Shared reader LED target:
#   exit/entry/status -> whole segment, e.g. unit0_mmu_RFID_read_exit
#   gate              -> legacy single lane, e.g. mmu_RFID_read_exit_4
# If the legacy gate target is outside Happy Hare's configured gate range, NFC
# falls back to whole-segment UNIT control so HH does not reject GATE=<n>.
shared_led_segment:     exit

# LED effect pairs:
#   *_effect is the [mmu_led_effect] name to start.
#   *_duration is passed to Happy Hare only for standalone/timeout effects.
#   Quick read effects stay interruptible so ready/unresolved can replace them.
#   The LED layer itself still controls flash rate/count/color.
#
# Example:
#   shared_tag_unresolved_effect: mmu_RFID_unresolved
#   unresolved_effect_duration:   1.0
# With the default `layers: strobe 2 2 ...`, that plays two red flashes, then
# HH returns the LEDs to the default effect after 1 second.
#
# Important HH behavior: MMU_SET_LED DURATION= sets a pending update flag for
# the unit. While that timer is active, Happy Hare silently ignores later LED
# effect requests for that same unit. For that reason normal shared read and
# staged-ready effects do not pass DURATION; they must be interruptible by the
# next shared-reader state. DURATION is reserved for standalone/timeout effects.
#
# Name of a [mmu_led_effect] to flash bright green when a tag is read.
# read_effect_duration is used as the HH duration for NFC_SHARED LED_TEST=1.
# During normal scans it is a local NFC failsafe timeout: if no follow-up state
# replaces the read effect, NFC releases the LEDs back to HH with MMU_GATE_MAP.
# It is not passed to HH, so ready/unresolved feedback can still replace it.
shared_tag_read_effect:       mmu_RFID_read
read_effect_duration:         2.0

# Name of a [mmu_led_effect] to flash when a tag is read while bypass is selected.
# Normal bypass reads do not pass a duration because the bypass-ready effect is
# expected to follow.
shared_bypass_tag_read_effect: mmu_RFID_bypass_read
bypass_read_effect_duration:   2.0

# Name of a [mmu_led_effect] to show while a spool is staged and waiting to
# load.  Stays on until preload commit/cancel/timeout releases HH ownership.
shared_spool_ready_effect:    mmu_RFID_ready

# Name of a [mmu_led_effect] to flash bright green when a bypass spool resolves.
shared_bypass_spool_ready_effect: mmu_RFID_bypass_ready
bypass_ready_effect_duration:     2.0

# Name of a [mmu_led_effect] to flash bright red 2x when a tag UID does
# not resolve to a Spoolman spool.
shared_tag_unresolved_effect: mmu_RFID_unresolved
unresolved_effect_duration:   2.0

# Name of a [mmu_led_effect] to switch to when the pending timeout is 80%
# elapsed. This is interruptible so Happy Hare can take LEDs back when preload
# starts; NFC's pending timer handles final timeout cleanup.
shared_spool_warning_effect:  mmu_RFID_warning

# Name of a [mmu_led_effect] to run a bright yellow chase while Spoolman
# creates a missing spool. Stops automatically when the create call finishes.
shared_auto_create_effect:    mmu_RFID_creating

# The pending spool timeout is read automatically from Happy Hare's
# mmu_parameters.cfg ([mmu] -> pending_spool_id_timeout).  Set it there.
# NFC falls back to 30 s if the HH config is not readable at connect time.

# Seconds polling may run after NFC_SHARED READ=1 without resolving a tag
# before auto-stopping.  No effect for startup_polling or post-PRELOAD_CHECK.
# shared_read_timeout: 120.0

# Consecutive unresolvable UIDs before the console advises MMU_PRELOAD.
shared_missed_limit: 3

# Set to true to block pregate loads entirely when no spool is staged.
force_spool_id: True
